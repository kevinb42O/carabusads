<!doctype html>
<html lang="nl" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carabus Ads — Google Ads, Social Ads & Funnels</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    
    <meta name="description" content="Carabus Ads beheert je Google Ads en Social Ads campagnes en bouwt de funnels die klikken omzetten in klanten. Eén vast aanspreekpunt, volledige transparantie." />
    <link rel="canonical" href="https://www.carabusads.com/" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Carabus Ads — Google Ads, Social Ads & Funnels" />
    <meta property="og:description" content="Wij beheren je advertentiecampagnes en bouwen de funnels die klikken omzetten in omzet." />
    <meta property="og:site_name" content="Carabus Ads" />
    <meta property="og:image" content="https://www.carabusads.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Carabus Ads — Google Ads, Social Ads & Funnels" />
    <meta name="twitter:description" content="Wij beheren je advertentiecampagnes en bouwen de funnels die klikken omzetten in omzet." />
    <meta name="twitter:image" content="https://www.carabusads.com/og-image.png" />

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MarketingAgency",
      "name": "Carabus Ads",
      "url": "https://www.carabusads.com/",
      "logo": "https://www.carabusads.com/favicon.png",
      "image": "https://www.carabusads.com/og-image.png",
      "description": "Carabus Ads beheert je Google Ads en Social Ads campagnes en bouwt de funnels die klikken omzetten in klanten. Eén vast aanspreekpunt, volledige transparantie.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+32472249346",
        "contactType": "customer service"
      }
    }
    </script>
    
    <!-- Fonts Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/carabusMETTEKST.png" media="(min-width: 768px)" />
    <link rel="modulepreload" href="/src/main.tsx" />
    <link rel="modulepreload" href="/src/App.tsx" />
    <link rel="modulepreload" href="/src/components/Hero.tsx" />
  </head>
  <body class="bg-[#0b1a29] text-white antialiased selection:bg-[#9bbcd9]/20 overflow-x-hidden">
    <div id="preloader" style="position: fixed; inset: 0; background-color: #0b1a29; display: flex; align-items: center; justify-content: center; z-index: 99999; font-family: 'Outfit', sans-serif;">
      <div style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <!-- Modern loading rings -->
        <div style="position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;">
          <div style="position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(155, 188, 217, 0.1); border-top-color: #9bbcd9; animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
          <div style="position: absolute; inset: -6px; border-radius: 50%; border: 1px solid transparent; border-bottom-color: rgba(155, 188, 217, 0.3); border-right-color: rgba(155, 188, 217, 0.1); animation: spin 2s linear infinite reverse;"></div>
          <!-- Logo inside -->
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="height: 28px; width: auto; animation: pulseGlow 2s ease-in-out infinite;">
            <path d="M6 9L16 14L26 9" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M9 16L16 20L23 16" stroke="rgba(255,255,255,0.85)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M12 23L16 26L20 23" stroke="rgba(255,255,255,0.65)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="16" cy="29" r="1.6" fill="#9bbcd9" />
          </svg>
        </div>
        <span style="color: white; font-weight: 700; font-size: 22px; letter-spacing: 0.05em; animation: pulseGlow 2s ease-in-out infinite;">Carabus<span style="color: #9bbcd9; font-weight: 900; text-transform: uppercase; margin-left: 2px;">Ads</span></span>
      </div>
    </div>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 8px rgba(155, 188, 217, 0.2)); }
        50% { opacity: 1; filter: drop-shadow(0 0 16px rgba(155, 188, 217, 0.5)); }
      }
    </style>
    <div id="root" class="w-full min-h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
