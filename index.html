<!doctype html>
<html lang="nl" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carabus Ads — Google Ads, Social Ads & Funnels</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    
    <meta name="description" content="Carabus Ads beheert je Google Ads en Social Ads campagnes en bouwt de funnels die klikken omzetten in klanten. Eén vast aanspreekpunt, volledige transparantie." />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Carabus Ads — Google Ads, Social Ads & Funnels" />
    <meta property="og:description" content="Wij beheren je advertentiecampagnes en bouwen de funnels die klikken omzetten in omzet." />
    <meta property="og:site_name" content="Carabus Ads" />
    <meta property="og:image" content="https://www.carabusads.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Carabus Ads — Google Ads, Social Ads & Funnels" />
    <meta name="twitter:description" content="Wij beheren je advertentiecampagnes en bouwen de funnels die klikken omzetten in omzet." />
    <meta name="twitter:image" content="https://www.carabusads.com/og-image.png" />
    
    <!-- Fonts Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body class="bg-[#f0f4f1] text-[#3d5a5a] antialiased selection:bg-[#2D7D6F]/20 overflow-x-hidden">
    <div id="preloader" style="position: fixed; inset: 0; background-color: #1a2e2e; display: flex; align-items: center; justify-content: center; z-index: 99999; font-family: 'Outfit', sans-serif;">
      <div style="display: flex; align-items: center; gap: 16px; animation: preloaderPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="height: 40px; width: auto;">
          <path d="M6 9L16 14L26 9" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M9 16L16 20L23 16" stroke="rgba(255,255,255,0.85)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M12 23L16 26L20 23" stroke="rgba(255,255,255,0.65)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="16" cy="29" r="1.6" fill="#5CCBBA" />
        </svg>
        <span style="color: white; font-weight: 700; font-size: 28px; line-height: 1;">Carabus<span style="color: #5CCBBA; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 2px;">Ads</span></span>
      </div>
    </div>
    <style>
      @keyframes preloaderPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.95); }
      }
    </style>
    <div id="root" class="w-full min-h-screen"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
